<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="silver_grad" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop stop-color="#F3F4F6"/>
            <stop offset="1" stop-color="#D1D5DB"/>
        </linearGradient>
        <filter id="drop_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- Navy Blue Background -->
    <rect width="512" height="512" rx="100" fill="#1B263B"/>
    
    <!-- The "OS" Letters -->
    <text
        x="50%"
        y="50%"
        fill="url(#silver_grad)"
        font-family="Arial, sans-serif"
        font-size="320"
        font-weight="bold"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-30"
        filter="url(#drop_shadow)"
    >RE</text>
</svg>
