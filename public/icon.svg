<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="200" height="200" fill="#000080"/> <rect x="20" y="20" width="70" height="110" fill="#FFD700" rx="10" ry="10"/>
  <rect x="40" y="40" width="70" height="110" fill="#FF4500" rx="10" ry="10"/>

  <text x="100" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#333" dominant-baseline="middle" text-anchor="middle">O</text>
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#333" dominant-baseline="middle" text-anchor="middle">S</text>

  <style>
    .card-yellow {
      fill: #FFD700; /* Gold */
    }
    .card-red {
      fill: #FF4500; /* Orange Red */
    }
    .letters {
      font-family: 'Arial', sans-serif;
      font-size: 80px;
      font-weight: bold;
      fill: #333;
    }
  </style>
